<html lang="en">

<meta charset="UTF-8">

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#fff;--bg2:#f8f8f7;--border:#e8e7e3;--border2:#d3d0c8;
    --text:#1a1a18;--text2:#6b6a66;--text3:#9a9894;
    --radius:8px;--radius-lg:12px;
    --font:'Inter',system-ui,-apple-system,sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1a1a1a;--bg2:#242424;--border:#333;--border2:#444;--text:#e8e8e6;--text2:#9a9894;--text3:#666}
  }
  body{font-family:var(--font);color:var(--text);background:var(--bg);padding:20px;min-height:100vh}
  #top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
  #back-btn{display:none;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 12px;font-size:13px;color:var(--text2);cursor:pointer}
  #back-btn:hover{border-color:var(--text3);color:var(--text)}
  #title{font-size:15px;font-weight:600;color:var(--text)}
  #search-bar{width:100%;padding:10px 14px;font-size:14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;margin-bottom:12px}
  #search-bar:focus{border-color:var(--border2);box-shadow:0 0 0 2px rgba(100,100,100,0.08)}
  #count-label{font-size:12px;color:var(--text3);margin-bottom:14px}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
  .b-purple{background:#EEEDFE;color:#3C3489}
  .b-blue{background:#E6F1FB;color:#0C447C}
  .b-teal{background:#E1F5EE;color:#085041}
  .b-amber{background:#FAEEDA;color:#633806}
  .b-coral{background:#FAECE7;color:#712B13}
  .b-green{background:#EAF3DE;color:#27500A}
  .b-gray{background:#F1EFE8;color:#444441}
  .b-pink{background:#FBEAF0;color:#72243E}
  .b-orange{background:#FEF0E6;color:#7A3010}
  #section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .section-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .section-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .section-card h3{font-size:14px;font-weight:500;margin:6px 0 3px}
  .section-card .meta{font-size:12px;color:var(--text2);margin-bottom:4px}
  .section-card .desc{font-size:11px;color:var(--text3);line-height:1.5}
  #global-results{display:none}
  .gr-section{margin-bottom:16px}
  .gr-section-title{margin-bottom:6px}
  .gr-row{padding:6px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;border:0.5px solid var(--border);background:var(--bg2);margin-bottom:4px;display:flex;gap:10px;align-items:flex-start}
  .gr-row:hover{border-color:var(--border2)}
  .gr-row code{font-size:12px;background:var(--bg);padding:1px 5px;border-radius:4px;border:0.5px solid var(--border);white-space:nowrap}
  .gr-desc{color:var(--text2);font-size:12px;line-height:1.5}
  #detail-view{display:none}
  #detail-header{margin-bottom:16px}
  #detail-header h2{font-size:16px;font-weight:600;margin:6px 0 4px}
  #detail-header .desc{font-size:13px;color:var(--text2)}
  #local-search{width:100%;padding:8px 12px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;margin-bottom:10px}
  #local-search:focus{border-color:var(--border2)}
  #detail-count{font-size:12px;color:var(--text3);margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg2)}
  td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:top;line-height:1.5}
  td:first-child{font-family:monospace;font-size:12px;white-space:nowrap}
  tr:hover td{background:var(--bg2)}
  .skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .skill-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
  .skill-card h4{font-size:13px;font-weight:600;margin-bottom:4px;font-family:monospace}
  .skill-card p{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}
  .skill-rules{font-size:11px;color:var(--text3);list-style:none}
  .skill-rules li{padding:3px 0;border-bottom:0.5px solid var(--border)}
  .skill-rules li:last-child{border:none}
  .skill-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--bg);border:0.5px solid var(--border);color:var(--text2);margin:1px}
  .skill-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  mark{background:#FFF3C4;color:inherit;border-radius:2px;padding:0 1px}
  .no-results{text-align:center;color:var(--text3);padding:40px 20px;font-size:13px}
  .section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px}
</style>
</head>

let currentSection = null;

function hl(text, q){
  if(!q) return String(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(text).replace(re,'<mark>$1</mark>');
}

function renderCards(filter=''){
  const grid = document.getElementById('section-grid');
  const globalResults = document.getElementById('global-results');
  const countEl = document.getElementById('count-label');
  grid.innerHTML=''; globalResults.innerHTML='';

  if(!filter){
    grid.style.display='grid';
    globalResults.style.display='none';
    countEl.textContent = SECTIONS.length + ' sections';
    SECTIONS.forEach(s=>{
      const card = document.createElement('div');
      card.className = 'section-card';
      card.innerHTML = `<div><span class="badge ${s.color}">${s.badge}</span></div><h3>${s.title}</h3><div class="meta">${s.meta}</div><div class="desc">${s.desc}</div>`;
      card.onclick = ()=>openSection(s.id);
      grid.appendChild(card);
    });
    return;
  }

  grid.style.display='none';
  globalResults.style.display='block';
  const q = filter.toLowerCase();
  let totalHits = 0;
  let html = '';

  SECTIONS.forEach(s=>{
    let matchedRows = [];
    if(s.type === 'skills'){
      matchedRows = s.skills.filter(sk=>
        sk.name.toLowerCase().includes(q)||
        sk.desc.toLowerCase().includes(q)||
        sk.tags.some(t=>t.includes(q))||
        sk.rules.some(r=>r.toLowerCase().includes(q))
      ).map(sk=>[sk.name, sk.desc]);
    } else {
      matchedRows = s.rows.filter(r=>r.some(c=>String(c).toLowerCase().includes(q)));
    }
    const titleMatch = s.title.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    if(!matchedRows.length && !titleMatch) return;
    totalHits += matchedRows.length;
    html += `<div class="gr-section">
      <div class="gr-section-title"><span class="badge ${s.color}" style="cursor:pointer" onclick="openSection('${s.id}')">${s.badge}: ${s.title}</span></div>
      ${matchedRows.map(r=>`<div class="gr-row" onclick="openSection('${s.id}')"><code>${hl(r[0],filter)}</code><span class="gr-desc">${hl(r.slice(1).join(' · '),filter)}</span></div>`).join('')}
    </div>`;
  });

  countEl.textContent = totalHits ? `${totalHits} result${totalHits!==1?'s':''} across ${SECTIONS.length} sections` : '';
  globalResults.innerHTML = html || '<div class="no-results">No results for "'+filter+'"</div>';
}

function openSection(id){
  currentSection = id;
  const s = SECTIONS.find(x=>x.id===id);
  document.getElementById('section-grid').style.display='none';
  document.getElementById('global-results').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('back-btn').style.display='inline-block';
  document.getElementById('search-bar').value='';
  document.getElementById('local-search').value='';
  document.getElementById('count-label').textContent='';

  document.getElementById('detail-header').innerHTML = `
    <div><span class="badge ${s.color}">${s.badge}</span></div>
    <h2>${s.title}</h2>
    <div class="desc">${s.meta} · ${s.desc}</div>
  `;
  renderDetail(s, '');
}

function renderDetail(s, filter=''){
  const content = document.getElementById('detail-content');
  const countEl = document.getElementById('detail-count');
  const q = filter.toLowerCase();

  if(s.type === 'skills'){
    const items = filter ? s.skills.filter(sk=>
      sk.name.toLowerCase().includes(q)||
      sk.desc.toLowerCase().includes(q)||
      sk.tags.some(t=>t.includes(q))||
      sk.rules.some(r=>r.toLowerCase().includes(q))
    ) : s.skills;
    countEl.textContent = filter ? `${items.length} of ${s.skills.length} skills` : `${s.skills.length} skills`;
    if(!items.length){ content.innerHTML='<div class="no-results">No results for "'+filter+'"</div>'; return; }
    content.innerHTML = `<div class="skill-grid">${items.map(sk=>`
      <div class="skill-card">
        <div class="skill-meta">
          <h4>${hl(sk.name,filter)}</h4>
          <span class="badge b-gray">${sk.category}</span>
        </div>
        <p>${hl(sk.desc,filter)}</p>
        <div class="section-label">Install &amp; Notes</div>
        <ul class="skill-rules">${sk.rules.map(r=>`<li>${hl(r,filter)}</li>`).join('')}</ul>
        <div style="margin-top:8px">${sk.tags.map(t=>`<span class="skill-tag">${t}</span>`).join('')}</div>
      </div>`).join('')}
    </div>`;
  } else {
    const items = filter ? s.rows.filter(r=>r.some(c=>String(c).toLowerCase().includes(q))) : s.rows;
    countEl.textContent = filter ? `${items.length} of ${s.rows.length} rows` : `${s.rows.length} rows`;
    if(!items.length){ content.innerHTML='<div class="no-results">No results for "'+filter+'"</div>'; return; }
    content.innerHTML = '<table><thead><tr>'+s.columns.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>'+
      items.map(r=>'<tr>'+r.map(c=>`<td>${hl(c,filter)}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
  }
}

function goBack(){
  currentSection = null;
  document.getElementById('section-grid').style.display='grid';
  document.getElementById('global-results').style.display='none';
  document.getElementById('detail-view').style.display='none';
  document.getElementById('back-btn').style.display='none';
  document.getElementById('search-bar').value='';
  document.getElementById('local-search').value='';
  renderCards('');
}

document.getElementById('search-bar').addEventListener('input', e=>{
  if(currentSection) goBack();
  renderCards(e.target.value.trim());
});
document.getElementById('local-search').addEventListener('input', e=>{
  if(!currentSection) return;
  const s = SECTIONS.find(x=>x.id===currentSection);
  renderDetail(s, e.target.value.trim());
});

renderCards('');
</script>
