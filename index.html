<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Command</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f8f8f7;--border:#e8e7e3;--border2:#d3d0c8;--text:#1a1a18;--text2:#6b6a66;--text3:#9a9894;--radius:8px;--radius-lg:12px;--font:Inter,system-ui,-apple-system,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--border:#333;--border2:#444;--text:#e8e8e6;--text2:#9a9894;--text3:#666}}
body{font-family:var(--font);color:var(--text);background:var(--bg);padding:20px;min-height:100vh}
#top-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
#back-btn{display:none;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 12px;font-size:13px;color:var(--text2);cursor:pointer}
#back-btn:hover{border-color:var(--text3);color:var(--text)}
#title{font-size:15px;font-weight:600}
#search-bar,#local-search{width:100%;padding:10px 14px;font-size:14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;margin-bottom:12px}
#local-search{font-size:13px;padding:8px 12px;margin-bottom:10px}
#count-label,#detail-count{font-size:12px;color:var(--text3);margin-bottom:14px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;background:#F1EFE8;color:#444441}
.b-pink{background:#FBEAF0;color:#72243E}.b-blue{background:#E6F1FB;color:#0C447C}.b-gray{background:#F1EFE8;color:#444441}
#section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.section-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer}
.section-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.section-card h3{font-size:14px;font-weight:500;margin:6px 0 3px}.section-card .meta{font-size:12px;color:var(--text2);margin-bottom:4px}.section-card .desc{font-size:11px;color:var(--text3);line-height:1.5}
#global-results,#detail-view{display:none}
.gr-section{margin-bottom:16px}.gr-section-title{margin-bottom:6px}
.gr-row{padding:6px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;border:0.5px solid var(--border);background:var(--bg2);margin-bottom:4px;display:flex;gap:10px;align-items:flex-start}
.gr-row code{font-size:12px;background:var(--bg);padding:1px 5px;border-radius:4px;border:0.5px solid var(--border);white-space:nowrap}
.gr-desc{color:var(--text2);font-size:12px;line-height:1.5}
#detail-header{margin-bottom:16px}#detail-header h2{font-size:16px;font-weight:600;margin:6px 0 4px}#detail-header .desc{font-size:13px;color:var(--text2)}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.skill-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.skill-card h4{font-size:13px;font-weight:600;margin-bottom:4px;font-family:monospace}
.skill-card p{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.skill-meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.skill-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--bg);border:0.5px solid var(--border);color:var(--text2);margin:1px}
.skill-rules{font-size:11px;color:var(--text3);list-style:none}.skill-rules li{padding:3px 0;border-bottom:0.5px solid var(--border)}
.no-results{text-align:center;color:var(--text3);padding:40px 20px;font-size:13px}
mark{background:#FFF3C4;color:inherit;border-radius:2px;padding:0 1px}
</style>
</head>
<body>
<div id="top-bar"><button id="back-btn" onclick="goBack()">← Back</button><span id="title">🗂️ Central Command</span></div>
<input id="search-bar" placeholder="Search across all sections…" autocomplete="off">
<div id="count-label">Loading skills…</div>
<div id="section-grid"></div>
<div id="global-results"></div>
<div id="detail-view">
  <div id="detail-header"></div>
  <input id="local-search" placeholder="Search within this section…" autocomplete="off">
  <div id="detail-count"></div>
  <div id="detail-content"></div>
</div>

<script>
let currentSection = null;
let SECTIONS = [];

function esc(v){return String(v ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function hl(text,q){
  const safe = esc(text);
  if(!q) return safe;
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return safe.replace(re,'<mark>$1</mark>');
}
function inferTags(text){
  const s = text.toLowerCase();
  const tags = [];
  [['ads','ads'],['seo','seo'],['marketing','marketing'],['email','email'],['copy','copywriting'],['design','design'],['ui','ui'],['code','dev'],['github','github'],['data','data'],['analytics','analytics'],['sales','sales'],['research','research'],['agent','agents'],['cursor','cursor'],['claude','claude'],['codex','codex']].forEach(([k,t])=>{if(s.includes(k)&&!tags.includes(t))tags.push(t)});
  return tags.length ? tags : ['skill'];
}
function inferCategory(text){
  const s = text.toLowerCase();
  if(/ad|seo|marketing|campaign|landing|cro|copy/.test(s)) return 'marketing';
  if(/code|github|dev|api|test|repo|ci|deploy/.test(s)) return 'dev';
  if(/design|ui|ux|figma/.test(s)) return 'design';
  if(/data|analytics|sql|bigquery/.test(s)) return 'data';
  if(/research|brief|reading/.test(s)) return 'research';
  return 'general';
}
function normalizeSkill(raw){
  const name = String(raw.name || raw.title || raw.slug || 'untitled-skill');
  const desc = String(raw.description || raw.desc || raw.summary || 'No description provided.');
  const source = String(raw.source || raw.path || raw.location || 'skills.json');
  const lastModified = String(raw.lastModified || raw.updatedAt || raw.modified || '');
  const tags = Array.isArray(raw.tags) ? raw.tags.map(String) : inferTags(name + ' ' + desc);
  const category = String(raw.category || tags[0] || inferCategory(name + ' ' + desc));
  const rules = [];
  if(lastModified) rules.push('Last modified: ' + lastModified);
  if(source) rules.push('Source: ' + source);
  return {name,tags,category,desc,rules};
}
async function loadSkills(){
  try{
    const res = await fetch('skills.json?ts=' + Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const skills = Array.isArray(data) ? data : (Array.isArray(data.skills) ? data.skills : []);
    SECTIONS = [{
      id:'all-skills',
      color:'b-pink',
      badge:'Skills',
      title:'All imported skills',
      meta:`${skills.length} skills · loaded from skills.json`,
      desc:'Complete generated inventory from your skills export.',
      type:'skills',
      skills:skills.map(normalizeSkill).sort((a,b)=>a.name.localeCompare(b.name))
    }];
    renderCards('');
  }catch(e){
    document.getElementById('count-label').textContent = 'Could not load skills.json. Make sure skills.json is in the repo root.';
  }
}
function matchesSkill(sk,q){
  return sk.name.toLowerCase().includes(q) ||
    sk.desc.toLowerCase().includes(q) ||
    sk.category.toLowerCase().includes(q) ||
    sk.tags.some(t=>String(t).toLowerCase().includes(q)) ||
    sk.rules.some(r=>String(r).toLowerCase().includes(q));
}
function renderCards(filter=''){
  const grid=document.getElementById('section-grid');
  const globalResults=document.getElementById('global-results');
  const countEl=document.getElementById('count-label');
  grid.innerHTML=''; globalResults.innerHTML='';
  if(!filter){
    grid.style.display='grid'; globalResults.style.display='none';
    countEl.textContent = SECTIONS.length ? SECTIONS[0].skills.length + ' skills loaded' : 'No skills loaded';
    SECTIONS.forEach(s=>{
      const card=document.createElement('div');
      card.className='section-card';
      card.innerHTML=`<div><span class="badge ${s.color}">${esc(s.badge)}</span></div><h3>${esc(s.title)}</h3><div class="meta">${esc(s.meta)}</div><div class="desc">${esc(s.desc)}</div>`;
      card.onclick=()=>openSection(s.id);
      grid.appendChild(card);
    });
    return;
  }
  grid.style.display='none'; globalResults.style.display='block';
  const q=filter.toLowerCase();
  let html='', totalHits=0;
  SECTIONS.forEach(s=>{
    const matched=s.skills.filter(sk=>matchesSkill(sk,q));
    totalHits += matched.length;
    html += `<div class="gr-section"><div class="gr-section-title"><span class="badge ${s.color}" onclick="openSection('${s.id}')">${esc(s.badge)}: ${esc(s.title)}</span></div>${matched.slice(0,100).map(sk=>`<div class="gr-row" onclick="openSection('${s.id}')"><code>${hl(sk.name,filter)}</code><span class="gr-desc">${hl(sk.desc,filter)}</span></div>`).join('')}</div>`;
  });
  countEl.textContent = totalHits ? `${totalHits} results` : '';
  globalResults.innerHTML = totalHits ? html : `<div class="no-results">No results for "${esc(filter)}"</div>`;
}
function openSection(id){
  currentSection=id;
  const s=SECTIONS.find(x=>x.id===id);
  document.getElementById('section-grid').style.display='none';
  document.getElementById('global-results').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('back-btn').style.display='inline-block';
  document.getElementById('search-bar').value='';
  document.getElementById('local-search').value='';
  document.getElementById('count-label').textContent='';
  document.getElementById('detail-header').innerHTML=`<div><span class="badge ${s.color}">${esc(s.badge)}</span></div><h2>${esc(s.title)}</h2><div class="desc">${esc(s.meta)} · ${esc(s.desc)}</div>`;
  renderDetail(s,'');
}
function renderDetail(s,filter=''){
  const content=document.getElementById('detail-content');
  const countEl=document.getElementById('detail-count');
  const q=filter.toLowerCase();
  const items = filter ? s.skills.filter(sk=>matchesSkill(sk,q)) : s.skills;
  countEl.textContent = filter ? `${items.length} of ${s.skills.length} skills` : `${s.skills.length} skills`;
  if(!items.length){content.innerHTML=`<div class="no-results">No results for "${esc(filter)}"</div>`;return;}
  content.innerHTML=`<div class="skill-grid">${items.map(sk=>`<div class="skill-card"><div class="skill-meta"><h4>${hl(sk.name,filter)}</h4><span class="badge b-gray">${esc(sk.category)}</span></div><p>${hl(sk.desc,filter)}</p><ul class="skill-rules">${sk.rules.map(r=>`<li>${hl(r,filter)}</li>`).join('')}</ul><div style="margin-top:8px">${sk.tags.map(t=>`<span class="skill-tag">${esc(t)}</span>`).join('')}</div></div>`).join('')}</div>`;
}
function goBack(){
  currentSection=null;
  document.getElementById('section-grid').style.display='grid';
  document.getElementById('global-results').style.display='none';
  document.getElementById('detail-view').style.display='none';
  document.getElementById('back-btn').style.display='none';
  document.getElementById('search-bar').value='';
  document.getElementById('local-search').value='';
  renderCards('');
}
document.getElementById('search-bar').addEventListener('input',e=>{if(currentSection)goBack();renderCards(e.target.value.trim());});
document.getElementById('local-search').addEventListener('input',e=>{if(!currentSection)return;const s=SECTIONS.find(x=>x.id===currentSection);renderDetail(s,e.target.value.trim());});
loadSkills();
</script>
  <script src="skill-sections.js"></script>
</body>
</html>
